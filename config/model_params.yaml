# File: config/model_params.yaml

strategies:
  full_comparison:
# ===========================================
# --- BENCHMARKS ESTATÍSTICOS (Estáticos) ---
# ===========================================
  - model_name: "base_arima"
    model_type: "ARIMA"
    comparison_group: "statistical"
    params:
      seasonal: true
      m: 24 # Será ajustado pelo script se a frequencia mudar
      start_p: 1
      start_q: 1
      max_p: 5
      max_q: 5
      d: null # Deixe null para auto_arima decidir
      D: null
      trace: false

  - model_name: "base_ets"
    model_type: "ETS"
    comparison_group: "statistical"
    params:
      trend: "add"
      seasonal: "add"
      damped_trend: true

  - model_name: "base_naive"
    model_type: "NAIVE"
    comparison_group: "statistical"
    params: {}

  - model_name: "base_seasonal_naive"
    model_type: "SEASONAL_NAIVE"
    comparison_group: "statistical"
    params: {}

# ============================================
# --- MODELOS DEEP LEARNING (Auto-Tunados) ---
# ============================================
  
  # N-HiTS Standalone
  - model_name: "base_nhits"
    model_type: "NHITS"
    comparison_group: "deep_learning"
    auto_tune: true      # <--- ATIVA A OTIMIZAÇÃO
    num_samples: 3      # <--- Testa 10 arquiteturas
    params: {}

  # N-BEATS Standalone
  - model_name: "base_nbeats"
    model_type: "NBEATS"
    comparison_group: "deep_learning"
    auto_tune: true      # <--- ATIVA A OTIMIZAÇÃO
    num_samples: 3      # <--- Testa 10 arquiteturas
    params: {}

  # Informer Standalone
  # - model_name: "base_informer"
